# --- PREFIX (Ctrl+g) ---
unbind C-b
set -g prefix C-g
bind C-g send-prefix 

# --- FAST ---
set -s escape-time 0

# --- MOUSE ---
set -g mouse on

# --- INDEX FIX ---
set -g base-index 1
setw -g pane-base-index 1

# --- Auto Renaming --- 
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"
set -g allow-rename off
