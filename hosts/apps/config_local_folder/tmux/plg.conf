# Plugin Manager
set -g @plugin 'tmux-plugins/tpm'

# Plugins
set -g @plugin 'tmux-plugins/tmux-sensible' # 
set -g @plugin 'tmux-plugins/tmux-resurrect' # closed session resuarct
set -g @plugin 'tmux-plugins/tmux-continuum' # continue backup sessions

# Bar Plugins
# set -g @plugin 'xamut/tmux-weather'   # optional
set -g @plugin 'tmux-plugins/tmux-gitbar' # GIT Bar
set -g @plugin 'tmux-plugins/tmux-battery' # Battery
set -g @plugin 'tmux-plugins/tmux-cpu'  # gives #{cpu_percentage} #{ram_percentage}

# VIM 
set -g @plugin 'christoomey/vim-tmux-navigator'

# themes
set -g @plugin 'catppuccin/tmux#v2.1.0'

# Initialize
run '~/.config/tmux/plugins/tpm/tpm'
