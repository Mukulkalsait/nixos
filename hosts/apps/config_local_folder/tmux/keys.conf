# ---------------------------
# 🪟 WINDOWS (tabs)
# ---------------------------
bind n new-window
bind x kill-window
bind , command-prompt -I "#W" "rename-window '%%'"

# Window switching — Alt+hl
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ---------------------------
# 🔲 PANES
# ---------------------------
bind r split-window -h
bind d split-window -v
bind D detach-client

# Pane navigation — Alt+hjkl (window switching uses Alt+hl, pane swap uses jk)
bind -n M-j swap-pane -D
bind -n M-k swap-pane -U

# ---------------------------
# 🪟 FLOATING (bottom-right block)
# ---------------------------
bind -n M-p if-shell "[ $(tmux list-panes | wc -l) -eq 1 ]" \
  "split-window -h -p 50 \; split-window -v -p 33" \
  "resize-pane -Z"

# ---------------------------
# 📐 RESIZE MODE (Ctrl+g c to enter)
# ---------------------------
bind c switch-client -T resize
bind -r -T resize h resize-pane -L 5
bind -r -T resize j resize-pane -D 5
bind -r -T resize k resize-pane -U 5
bind -r -T resize l resize-pane -R 5
bind -T resize Escape switch-client -T root

# ---------------------------
# 📋 MENUS
# ---------------------------
bind S display-menu -T "#[bold]Sessions" \
    "New Session"      n "new-session" \
    "Kill Session"     k "kill-session" \
    "Rename Session"   r "command-prompt -I '#S' 'rename-session %%'" \
    "Detach"           d "detach-client" \
    ""                 "" "" \
    "List Sessions"    l "choose-session"

bind P display-menu -T "#[bold]Panes" \
    "Split Right"      r "split-window -h" \
    "Split Down"       d "split-window -v" \
    "Zoom Toggle"      z "resize-pane -Z" \
    "Break to Window"  b "break-pane" \
    "Kill Pane"        x "kill-pane" \
    ""                 "" "" \
    "Swap Up"          k "swap-pane -U" \
    "Swap Down"        j "swap-pane -D"

# ---------------------------
# 🔁 RELOAD
# ---------------------------
bind R source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# ---------------------------
# ⚙️  MISC
# ---------------------------
set-window-option -g mode-keys vi
set-option -g status-position bottom
